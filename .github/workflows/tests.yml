name: Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pre-commit
            recipe: pre-commit
            frontend: true
          - name: test
            recipe: test
            frontend: false
          - name: test-integration
            recipe: test-integration
            frontend: true
          - name: test-frontend-e2e
            recipe: test-frontend-e2e
            frontend: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea

      - name: Install repo tools
        run: mise install

      - name: Install just
        run: mise install just@1.56.0

      - name: Install frontend dependencies
        if: matrix.frontend
        run: mise exec just@1.56.0 -- just frontend-install

      - name: Run ${{ matrix.recipe }}
        env:
          MINA_FRONTEND_E2E_WORKERS: "1"
        run: mise exec just@1.56.0 -- just ${{ matrix.recipe }}
