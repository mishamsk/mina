name: Docker Image

on:
  workflow_call:
    inputs:
      promote-main:
        description: Promote the tested image to the mutable main tag when the commit is still main.
        required: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/mishamsk/mina

jobs:
  image:
    name: Build, publish, and verify image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install mise
        uses: jdx/mise-action@c53b9236f0b3370f31520f8b142f141256d839c6

      - name: Install repo tools
        run: mise install

      - name: Set image creation time
        run: echo "CREATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SHA image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            SOURCE=https://github.com/${{ github.repository }}
            REVISION=${{ github.sha }}
            VERSION=${{ github.sha }}
            CREATED=${{ env.CREATED }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.sha }}
            org.opencontainers.image.created=${{ env.CREATED }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check remote SHA manifest
        run: just docker-manifest-check "${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Test published SHA image
        run: MINA_IMAGE="${IMAGE_NAME}:${GITHUB_SHA}" just test-docker

      - name: Check current main tip
        if: inputs.promote-main
        id: main-tip
        run: |
          main_sha="$(git ls-remote --heads "https://github.com/${GITHUB_REPOSITORY}.git" main | awk '{print $1}')"
          if [[ "$main_sha" == "$GITHUB_SHA" ]]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
          else
            echo "current=false" >> "$GITHUB_OUTPUT"
            echo "Skipping main promotion: current main is ${main_sha:-unknown}, workflow SHA is $GITHUB_SHA"
          fi

      - name: Promote tested image to main
        if: inputs.promote-main && steps.main-tip.outputs.current == 'true'
        run: docker buildx imagetools create --tag "${IMAGE_NAME}:main" "${IMAGE_NAME}:${GITHUB_SHA}"
