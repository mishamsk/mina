version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: America/New_York
    groups:
      go-modules:
        patterns:
          - "*"
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: America/New_York
    groups:
      frontend:
        patterns:
          - "*"
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: America/New_York
    groups:
      docker:
        patterns:
          - "*"
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: America/New_York
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - major
          - minor
          - patch
