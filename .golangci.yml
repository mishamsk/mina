version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - depguard
  settings:
    depguard:
      rules:
        cmd-delegates-to-runtime:
          list-mode: lax
          files:
            - cmd/mina/*.go
            - cmd/mina/**/*.go
            - "**/cmd/mina/*.go"
            - "**/cmd/mina/**/*.go"
          deny:
            - pkg: github.com/mishamsk/mina/internal/httpclient
              desc: cmd/mina must not use the generated REST client until an approved production use case exists
            - pkg: github.com/mishamsk/mina/internal/httpapi
              desc: cmd/mina should delegate application behavior through internal/runtime
            - pkg: github.com/mishamsk/mina/internal/background
              desc: cmd/mina should delegate background operation wiring through internal/runtime
            - pkg: github.com/mishamsk/mina/internal/providers
              desc: cmd/mina should delegate provider wiring through internal/runtime
            - pkg: github.com/mishamsk/mina/internal/services
              desc: cmd/mina should delegate application behavior through internal/runtime
            - pkg: github.com/mishamsk/mina/internal/store
              desc: cmd/mina should delegate application behavior through internal/runtime
        clientcli-boundaries:
          list-mode: lax
          files:
            - internal/clientcli/*.go
            - internal/clientcli/**/*.go
            - "**/internal/clientcli/*.go"
            - "**/internal/clientcli/**/*.go"
          deny:
            - pkg: database/sql
              desc: client CLI packages must not own SQL access
            - pkg: github.com/duckdb/duckdb-go/v2
              desc: client CLI packages must not know DuckDB
            - pkg: github.com/mishamsk/mina/internal/background
              desc: client CLI packages must not know background runners
            - pkg: github.com/mishamsk/mina/internal/httpapi
              desc: client CLI packages must not know REST/OpenAPI server adapters
            - pkg: github.com/mishamsk/mina/internal/mcpserver
              desc: client CLI packages must not know MCP server behavior
            - pkg: github.com/mishamsk/mina/internal/providers
              desc: client CLI packages must not know concrete providers
            - pkg: github.com/mishamsk/mina/internal/runtime
              desc: client CLI packages must not know runtime composition
            - pkg: github.com/mishamsk/mina/internal/services
              desc: client CLI packages must not know service packages
            - pkg: github.com/mishamsk/mina/internal/store
              desc: client CLI packages must not own persistence
            - pkg: github.com/mishamsk/mina/internal/webui
              desc: client CLI packages must not know web UI behavior
        mcpserver-boundaries:
          list-mode: lax
          files:
            - internal/mcpserver/*.go
            - internal/mcpserver/**/*.go
            - "**/internal/mcpserver/*.go"
            - "**/internal/mcpserver/**/*.go"
          deny:
            - pkg: database/sql
              desc: MCP server packages must not own SQL access
            - pkg: github.com/duckdb/duckdb-go/v2
              desc: MCP server packages must not know DuckDB
            - pkg: github.com/mishamsk/mina/internal/background
              desc: MCP server packages must not know background runners
            - pkg: github.com/mishamsk/mina/internal/clientcli
              desc: MCP server packages must not know client CLI behavior
            - pkg: github.com/mishamsk/mina/internal/httpapi
              desc: MCP server packages must not know REST/OpenAPI server adapters
            - pkg: github.com/mishamsk/mina/internal/providers
              desc: MCP server packages must not know concrete providers
            - pkg: github.com/mishamsk/mina/internal/runtime
              desc: MCP server packages must not know runtime composition
            - pkg: github.com/mishamsk/mina/internal/services
              desc: MCP server packages must not know service packages
            - pkg: github.com/mishamsk/mina/internal/store
              desc: MCP server packages must not own persistence
            - pkg: github.com/mishamsk/mina/internal/webui
              desc: MCP server packages must not know web UI behavior
            - pkg: github.com/spf13/cobra
              desc: MCP server packages must not know CLI parsing
            - pkg: github.com/spf13/pflag
              desc: MCP server packages must not know CLI flags
        product-no-tools:
          list-mode: lax
          files:
            - $all
            - "!internal/tools/*.go"
            - "!internal/tools/**/*.go"
            - "!**/internal/tools/*.go"
            - "!**/internal/tools/**/*.go"
          deny:
            - pkg: github.com/mishamsk/mina/internal/tools
              desc: product packages must not import repository tooling
        normal-app-test-boundaries:
          list-mode: lax
          files:
            - internal/apptest/runtime/*_test.go
            - internal/apptest/runtime/**/*_test.go
            - "**/internal/apptest/runtime/*_test.go"
            - "**/internal/apptest/runtime/**/*_test.go"
          allow:
            - github.com/mishamsk/mina/internal/httpclient
            - github.com/mishamsk/mina/internal/apptest
          deny:
            - pkg: database/sql
              desc: normal app tests should exercise persistence through apptest helpers
            - pkg: github.com/duckdb/duckdb-go/v2
              desc: normal app tests should not know the database driver
            - pkg: github.com/mishamsk/mina
              desc: normal app tests should exercise behavior through internal/apptest
            - pkg: github.com/rogpeppe/go-internal/testscript
              desc: testscript belongs only to the integration test driver
            - pkg: net/http/httptest
              desc: normal app tests should use the apptest client instead of raw handler tests
        apptest-harness-boundaries:
          list-mode: lax
          files:
            - internal/apptest/*.go
            - internal/apptest/**/*.go
            - "**/internal/apptest/*.go"
            - "**/internal/apptest/**/*.go"
          deny:
            - pkg: github.com/mishamsk/mina/internal/store
              desc: the app-test harness drives the app through runtime composition and the REST client, never the store directly
        integration-test-boundaries:
          list-mode: strict
          files:
            - cmd/mina/cli_smoke_test.go
            - "**/cmd/mina/cli_smoke_test.go"
          allow:
            - github.com/modelcontextprotocol/go-sdk/mcp$
            - github.com/rogpeppe/go-internal/testscript$
            - io$
            - net$
            - net/http$
            - os$
            - os/exec$
            - strconv$
            - testing$
            - time$
        service-boundaries:
          list-mode: lax
          files:
            - internal/services/*.go
            - internal/services/**/*.go
            - "**/internal/services/*.go"
            - "**/internal/services/**/*.go"
          deny:
            - pkg: database/sql
              desc: service packages own domain behavior, not SQL access
            - pkg: github.com/mishamsk/mina/internal/appconfig
              desc: service packages must not know source-loaded app config
            - pkg: github.com/duckdb/duckdb-go/v2
              desc: service packages must not know DuckDB
            - pkg: github.com/cenkalti/backoff/v5
              desc: retry/backoff belongs at the background runner boundary
            - pkg: github.com/robfig/cron/v3
              desc: schedules belong at the background runner boundary
            - pkg: github.com/mishamsk/mina/internal/background
              desc: service packages must not know background runner composition
            - pkg: github.com/mishamsk/mina/internal/httpapi
              desc: service packages must not know REST/OpenAPI adapters
            - pkg: github.com/mishamsk/mina/internal/httpclient
              desc: service packages must not use the generated REST client
            - pkg: github.com/mishamsk/mina/internal/providers
              desc: service packages own provider interfaces and must not import concrete providers
            - pkg: github.com/mishamsk/mina/internal/runtime
              desc: service packages must not know runtime composition
            - pkg: github.com/mishamsk/mina/internal/store
              desc: service packages must not know persistence implementations
            - pkg: github.com/spf13/cobra
              desc: service packages must not know CLI parsing
            - pkg: github.com/spf13/pflag
              desc: service packages must not know CLI flags
            - pkg: net/http
              desc: service packages must not know HTTP transport
            - pkg: os
              desc: service packages must not perform process I/O
            - pkg: syscall
              desc: service packages must not perform process I/O
        store-boundaries:
          list-mode: lax
          files:
            - internal/store/*.go
            - internal/store/**/*.go
            - "**/internal/store/*.go"
            - "**/internal/store/**/*.go"
          deny:
            - pkg: github.com/mishamsk/mina/internal/appconfig
              desc: store must not know source-loaded app config
            - pkg: github.com/mishamsk/mina/internal/httpclient
              desc: store must not use the generated REST client
            - pkg: github.com/mishamsk/mina/internal/httpapi
              desc: store must not know REST/OpenAPI adapters
            - pkg: github.com/mishamsk/mina/internal/background
              desc: store must not know background runners
            - pkg: github.com/mishamsk/mina/internal/providers
              desc: store must not know concrete providers
            - pkg: github.com/mishamsk/mina/internal/runtime
              desc: store must not know runtime composition
            - pkg: github.com/spf13/cobra
              desc: store must not know CLI parsing
            - pkg: github.com/spf13/pflag
              desc: store must not know CLI flags
            - pkg: net/http
              desc: store must not know HTTP transport
        httpapi-boundaries:
          list-mode: lax
          files:
            - internal/httpapi/*.go
            - internal/httpapi/**/*.go
            - "**/internal/httpapi/*.go"
            - "**/internal/httpapi/**/*.go"
          deny:
            - pkg: database/sql
              desc: HTTP adapters must not own SQL access
            - pkg: github.com/mishamsk/mina/internal/appconfig
              desc: HTTP adapters must not know source-loaded app config
            - pkg: github.com/duckdb/duckdb-go/v2
              desc: HTTP adapters must not know DuckDB
            - pkg: github.com/mishamsk/mina/internal/httpclient
              desc: HTTP adapters must not use the generated REST client
            - pkg: github.com/mishamsk/mina/internal/background
              desc: HTTP adapters must not know background runners
            - pkg: github.com/mishamsk/mina/internal/providers
              desc: HTTP adapters must not know concrete providers
            - pkg: github.com/mishamsk/mina/internal/runtime
              desc: HTTP adapters must not know runtime composition
            - pkg: github.com/mishamsk/mina/internal/store
              desc: HTTP adapters must not own persistence
            - pkg: github.com/spf13/cobra
              desc: HTTP adapters must not know CLI parsing
            - pkg: github.com/spf13/pflag
              desc: HTTP adapters must not know CLI flags
            - pkg: os
              desc: HTTP adapters must not perform process I/O
        openapi-contract-boundaries:
          list-mode: lax
          files:
            - internal/httpapi/openapi/*.go
            - internal/httpapi/openapi/**/*.go
            - "**/internal/httpapi/openapi/*.go"
            - "**/internal/httpapi/openapi/**/*.go"
          deny:
            - pkg: github.com/mishamsk/mina/internal/services
              desc: generated OpenAPI contract code must not know service packages
        provider-boundaries:
          list-mode: lax
          files:
            - internal/providers/*.go
            - internal/providers/**/*.go
            - "**/internal/providers/*.go"
            - "**/internal/providers/**/*.go"
          deny:
            - pkg: database/sql # Providers may later get provider-owned non-Mina SQL access if needed.
              desc: providers must not own SQL access
            - pkg: github.com/mishamsk/mina/internal/appconfig
              desc: providers must not know source-loaded app config
            - pkg: github.com/duckdb/duckdb-go/v2 # Providers may later get provider-owned non-Mina SQL access if needed.
              desc: providers must not know DuckDB
            - pkg: github.com/mishamsk/mina/internal/httpapi
              desc: providers must not know REST/OpenAPI adapters
            - pkg: github.com/mishamsk/mina/internal/httpclient
              desc: providers must not use the generated REST client
            - pkg: github.com/mishamsk/mina/internal/runtime
              desc: providers must not know runtime composition
            - pkg: github.com/mishamsk/mina/internal/store
              desc: providers must not own Mina persistence or import internal/store
            - pkg: github.com/spf13/cobra
              desc: providers must not know CLI parsing
            - pkg: github.com/spf13/pflag
              desc: providers must not know CLI flags
        background-boundaries:
          list-mode: lax
          files:
            - internal/background/*.go
            - internal/background/**/*.go
            - "**/internal/background/*.go"
            - "**/internal/background/**/*.go"
          deny:
            - pkg: database/sql
              desc: background runners must not own SQL access
            - pkg: github.com/mishamsk/mina/internal/appconfig
              desc: background runners must not know source-loaded app config
            - pkg: github.com/duckdb/duckdb-go/v2
              desc: background runners must not know DuckDB
            - pkg: github.com/mishamsk/mina/internal/httpapi
              desc: background runners must not know REST/OpenAPI adapters
            - pkg: github.com/mishamsk/mina/internal/httpclient
              desc: background runners must not use the generated REST client
            - pkg: github.com/mishamsk/mina/internal/providers
              desc: background runners must call services, not providers
            - pkg: github.com/mishamsk/mina/internal/runtime
              desc: background runners must not know runtime composition
            - pkg: github.com/mishamsk/mina/internal/store
              desc: background runners must not own persistence
            - pkg: github.com/spf13/cobra
              desc: background runners must not know CLI parsing
            - pkg: github.com/spf13/pflag
              desc: background runners must not know CLI flags
        appconfig-boundaries:
          list-mode: lax
          files:
            - internal/appconfig/*.go
            - internal/appconfig/**/*.go
            - "**/internal/appconfig/*.go"
            - "**/internal/appconfig/**/*.go"
          deny:
            - pkg: github.com/mishamsk/mina/internal/runtime
              desc: appconfig must not know runtime composition
            - pkg: github.com/mishamsk/mina/internal/store
              desc: appconfig must not know persistence
            - pkg: github.com/mishamsk/mina/internal/httpapi
              desc: appconfig must not know REST/OpenAPI adapters
            - pkg: github.com/mishamsk/mina/internal/background
              desc: appconfig must not know background runners
            - pkg: github.com/mishamsk/mina/internal/providers
              desc: appconfig must not know concrete providers
            - pkg: github.com/mishamsk/mina/internal/services
              desc: appconfig must not know service packages
            - pkg: github.com/spf13/cobra
              desc: appconfig must not know CLI parsing
            - pkg: github.com/spf13/pflag
              desc: appconfig must not know CLI flags
        x-library-boundaries:
          list-mode: lax
          files:
            - internal/x/*.go
            - internal/x/**/*.go
            - "**/internal/x/*.go"
            - "**/internal/x/**/*.go"
          deny:
            - pkg: github.com/mishamsk/mina
              desc: internal/x packages must stay app-agnostic
        runtime-store-boundaries:
          list-mode: lax
          files:
            - internal/runtime/*.go
            - internal/runtime/**/*.go
            - "**/internal/runtime/*.go"
            - "**/internal/runtime/**/*.go"
            # Runtime may touch store only in manual composition/database lifecycle and config-to-store request translation files.
            - "!internal/runtime/app.go"
            - "!internal/runtime/config.go"
            - "!**/internal/runtime/app.go"
            - "!**/internal/runtime/config.go"
          deny:
            - pkg: github.com/mishamsk/mina/internal/store
              desc: future runtime files needing store access must be added explicitly with a narrow reason instead of broadening all runtime access
        runtime-composition-only:
          list-mode: lax
          files:
            - $all
            - !$test
            - "!cmd/mina/*.go"
            - "!cmd/mina/**/*.go"
            - "!**/cmd/mina/*.go"
            - "!**/cmd/mina/**/*.go"
            - "!internal/apptest/*.go"
            - "!internal/apptest/**/*.go"
            - "!**/internal/apptest/*.go"
            - "!**/internal/apptest/**/*.go"
            - "!internal/clientcli/*.go"
            - "!internal/clientcli/**/*.go"
            - "!**/internal/clientcli/*.go"
            - "!**/internal/clientcli/**/*.go"
            - "!internal/mcpserver/*.go"
            - "!internal/mcpserver/**/*.go"
            - "!**/internal/mcpserver/*.go"
            - "!**/internal/mcpserver/**/*.go"
          deny:
            - pkg: github.com/mishamsk/mina/internal/httpclient
              desc: production REST client use is limited to the approved client surfaces
            - pkg: github.com/mishamsk/mina/internal/runtime
              desc: runtime composition may only be imported by cmd/mina and app-test helpers
