operations:
  seedDemo:
    cli: {state: exposed, name: seed}
    mcp:
      state: excluded
      reason: Bulk demo seeding can overwrite real household state and belongs to developer setup workflows.
  getHealth:
    cli: {state: exposed, name: status}
    mcp:
      state: excluded
      reason: Transport liveness is a deployment diagnostic and provides no household accounting value to an agent.
