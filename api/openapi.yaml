  /api/records:
    get:
      operationId: searchJournalRecords
      summary: Search active journal records.
      parameters:
        - name: account_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: account_fqn_prefix
          in: query
          required: false
          description: Account FQN prefix for a grouped register. Matches records whose account FQN equals the prefix or is a descendant below it, including balance and flow accounts. Mutually exclusive with account_id.
          schema:
            type: string
        - name: category_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: tag_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: member_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: posting_status
          in: query
          required: false
          description: Filters records by posting status. Expected records are excluded by default and returned only when this filter is explicitly `expected`.
          schema:
            $ref: "#/components/schemas/PostingStatus"
        - name: reconciliation_status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReconciliationStatus"
        - name: amount_min
          in: query
          required: false
          description: JSON string, not a JSON number. Signed DECIMAL(18,8) minimum filter; use at most 10 integer digits and 8 fractional digits; responses use fixed-scale formatting with exactly 8 fractional digits.
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: amount_max
          in: query
          required: false
          description: JSON string, not a JSON number. Signed DECIMAL(18,8) maximum filter; use at most 10 integer digits and 8 fractional digits; responses use fixed-scale formatting with exactly 8 fractional digits.
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: amount_usd_min
          in: query
          required: false
          description: JSON string, not a JSON number. Signed DECIMAL(18,8) USD minimum filter; use at most 10 integer digits and 8 fractional digits; responses use fixed-scale formatting with exactly 8 fractional digits.
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: amount_usd_max
          in: query
          required: false
          description: JSON string, not a JSON number. Signed DECIMAL(18,8) USD maximum filter; use at most 10 integer digits and 8 fractional digits; responses use fixed-scale formatting with exactly 8 fractional digits.
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: initiated_date_from
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
            format: date
        - name: initiated_date_to
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
            format: date
        - name: pending_date_from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: pending_date_to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: posted_date_from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: posted_date_to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: memo_contains
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Matching active journal records in transaction date order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalRecordSearchResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/accounts/{account_id}/records:
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: searchAccountJournalRecords
