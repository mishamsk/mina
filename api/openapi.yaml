            x-enum-varnames:
              - ListTransactionsParamsSortInitiatedDate
              - ListTransactionsParamsSortCreatedAt
        - name: sort_dir
          description: "Sort direction for matching results; defaults to `desc`."
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
            x-enum-varnames:
              - ListTransactionsParamsSortDirAsc
              - ListTransactionsParamsSortDirDesc
        - name: limit
          description: "Maximum number of matching results to return, from 1 through 500; supply this to keep responses bounded."
