          $ref: "#/components/responses/InvalidRequest"
  /api/records/bulk/account:
    post:
      operationId: bulkReassignJournalRecordAccount
      tags:
        - records
      summary: Assign one account to selected journal records.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkReassignRecordsAccountRequest"
      responses:
        "200":
          description: Record accounts reassigned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRecordOperationResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/records/bulk/status:
    post:
      operationId: bulkUpdateJournalRecordStatuses
      tags:
        - records
      summary: Update posting and reconciliation statuses on selected journal records.
      description: Updates are rejected when they would leave any transaction with a mix of cancelled and non-cancelled active journal records, or with a mix of expected and non-expected active journal records.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpdateRecordStatusRequest"
      responses:
        "200":
          description: Record statuses updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRecordOperationResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/transactions/{transaction_id}:
    parameters:
      - name: transaction_id
        description: "Numeric identifier of the transaction."
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getTransaction
      tags:
        - transactions
      summary: Get a transaction with journal records.
      responses:
        "200":
          description: Transaction found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: replaceTransaction
      tags:
        - transactions
      summary: Replace a transaction and its journal records.
      description: Replaces initiated_date and the full journal record set atomically. The transaction_id is preserved, previous active records are tombstoned, and replacement records must balance to zero amount within each currency.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTransactionRequest"
      responses:
        "200":
          description: Transaction replaced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTransaction
      tags:
        - transactions
      summary: Tombstone a transaction and its journal records.
      responses:
        "204":
          description: Transaction tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/transactions/{transaction_id}/cancel:
    parameters:
      - name: transaction_id
        description: "Numeric identifier of the transaction."
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    post:
      operationId: cancelTransaction
      tags:
        - transactions
      summary: Cancel a transaction.
      description: Sets posting_status to cancelled on all active journal records for the transaction. The operation is idempotent for an already-cancelled transaction and does not change dates or reconciliation status.
      responses:
        "200":
          description: Transaction cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  responses:
    InvalidRequest:
      description: The request is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    MethodNotAllowed:
      description: The route does not support the requested method.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: The server failed unexpectedly.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: The request conflicts with existing state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AccountFQNConflict:
      description: The account FQN duplicates an active account or conflicts with the active account hierarchy.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    CategoryFQNConflict:
      description: The category FQN duplicates an active category, conflicts with the active category hierarchy, or a category restructure would collide with active budget category/month rows.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TagFQNConflict:
      description: The tag FQN duplicates an active tag or conflicts with the active tag hierarchy.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TransactionTemplateFQNConflict:
      description: The transaction template FQN duplicates an active template or conflicts with the active template hierarchy.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    DemoSeedResponse:
      type: object
      additionalProperties: false
      required:
        - members
        - accounts
        - categories
        - tags
        - exchange_rates
        - credit_limit_entries
        - transactions
        - recurring_definitions
        - recurring_occurrences
      properties:
        members:
          type: integer
          minimum: 0
        accounts:
          type: integer
          minimum: 0
        categories:
          type: integer
          minimum: 0
        tags:
          type: integer
          minimum: 0
        exchange_rates:
          type: integer
          minimum: 0
        credit_limit_entries:
          type: integer
          minimum: 0
        transactions:
          type: integer
          minimum: 0
        recurring_definitions:
          type: integer
          minimum: 0
        recurring_occurrences:
          type: integer
          minimum: 0
    Account:
      type: object
      additionalProperties: false
      required:
        - account_id
        - fqn
        - account_type
        - is_hidden
        - is_featured
        - parent_fqn
        - name
        - level
        - created_at
        - updated_at
      properties:
        account_id:
          type: integer
          format: int64
        fqn:
          type: string
        account_type:
          $ref: "#/components/schemas/AccountType"
        is_hidden:
          type: boolean
        is_featured:
          type: boolean
        deletable:
          type: boolean
          description: Populated in listAccounts responses. True when the active account has no active dependent resources and can be tombstone-deleted.
        currency:
          type: string
          nullable: true
          pattern: ^([A-Z]{3}|C::.+)$
        external_id:
          type: string
          nullable: true
        external_system:
          type: string
          nullable: true
        parent_fqn:
          type: string
          nullable: true
        name:
          type: string
        level:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tombstoned_at:
          type: string
          format: date-time
          nullable: true
    AccountListResponse:
      type: object
      additionalProperties: false
      required:
        - accounts
        - total_count
      properties:
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/Account"
        total_count:
          type: integer
          format: int64
          minimum: 0
          description: Count of matching accounts before limit and offset are applied.
    GroupState:
      type: object
      additionalProperties: false
      required:
        - fqn
        - parent_fqn
        - level
        - is_hidden
      properties:
        fqn:
          type: string
        parent_fqn:
          type: string
          nullable: true
        level:
          type: integer
          minimum: 0
        is_hidden:
          type: boolean
    GroupStateListResponse:
      type: object
      additionalProperties: false
      required:
        - groups
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/GroupState"
    RestructureRequest:
      type: object
      additionalProperties: false
      required:
        - from_fqn
        - to_fqn
      properties:
        from_fqn:
          description: "Existing leaf or implicit-group FQN prefix whose active subtree will move."
          type: string
        to_fqn:
          description: "Destination FQN prefix for the moved active subtree."
          type: string
    RestructureResponse:
      type: object
      additionalProperties: false
      required:
        - moved_count
      properties:
        moved_count:
          type: integer
          format: int64
          minimum: 0
    SetHiddenByPathRequest:
      type: object
      additionalProperties: false
      required:
        - path_fqn
        - is_hidden
      properties:
        path_fqn:
          description: "Leaf or implicit-group FQN path whose active descendants will be updated."
          type: string
        is_hidden:
          description: "Whether the entity is excluded from default lists."
          type: boolean
    SetHiddenByPathResponse:
      type: object
      additionalProperties: false
      required:
        - updated_count
      properties:
        updated_count:
          type: integer
          format: int64
          minimum: 0
    AccountBalance:
      type: object
      additionalProperties: false
      required:
        - account_id
        - currency
        - current_balance
        - current_balance_usd
        - posted_balance
        - unconverted_count
      properties:
        account_id:
          type: integer
          format: int64
        currency:
          type: string
          pattern: ^([A-Z]{3}|C::.+)$
        current_balance:
          type: string
          description: JSON string, not a JSON number. Posted plus pending aggregate DECIMAL(18,8) balance in this currency; cancelled and expected records excluded. Responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^-?[0-9]{1,30}(\.[0-9]{1,8})?$
          maxLength: 40
        credit_limit:
          type: string
          description: JSON string, not a JSON number. Current credit limit for the account, when known, from the latest active credit-limit-history row with effective_date on or before the API runtime clock's local civil date. Responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^-?[0-9]{1,30}(\.[0-9]{1,8})?$
          maxLength: 40
        current_balance_usd:
          type: string
          description: JSON string, not a JSON number. Approximate USD-equivalent DECIMAL(18,8) aggregate using stored journal-record amount_usd values only; no query-time exchange-rate conversion is performed. Partial when unconverted_count is greater than zero. Responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^-?[0-9]{1,30}(\.[0-9]{1,8})?$
          maxLength: 40
        posted_balance:
          type: string
          description: JSON string, not a JSON number. Posted-only aggregate DECIMAL(18,8) balance in this currency; cancelled and expected records excluded. Responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^-?[0-9]{1,30}(\.[0-9]{1,8})?$
          maxLength: 40
        unconverted_count:
          type: integer
          format: int64
          minimum: 0
          description: Count of active non-cancelled records contributing to this balance row that do not have amount_usd.
    AccountBalanceListResponse:
      type: object
      additionalProperties: false
      required:
        - balances
      properties:
        balances:
          type: array
          items:
            $ref: "#/components/schemas/AccountBalance"
    AccountType:
      description: "Account semantic type: balance is household-facing state, flow is an external source or destination, and system is internal accounting mechanics."
      type: string
      enum:
        - balance
        - flow
        - system
    CreditLimitHistory:
      type: object
      additionalProperties: false
      required:
        - credit_limit_history_id
        - account_id
        - credit_limit
        - effective_date
        - created_at
      properties:
        credit_limit_history_id:
          type: integer
          format: int64
        account_id:
          type: integer
          format: int64
        credit_limit:
          type: string
          description: JSON string, not a JSON number. Non-negative DECIMAL(18,8); responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^[0-9]{1,10}(\.[0-9]{1,8})?$
          maxLength: 19
        effective_date:
          type: string
          pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
          format: date
        created_at:
          type: string
          format: date-time
        tombstoned_at:
          type: string
          format: date-time
          nullable: true
    CreditLimitHistoryListResponse:
      type: object
      additionalProperties: false
      required:
        - credit_limit_history
        - total_count
      properties:
        credit_limit_history:
          type: array
          items:
            $ref: "#/components/schemas/CreditLimitHistory"
        total_count:
          type: integer
          format: int64
          minimum: 0
          description: Count of matching credit limit history rows before limit and offset are applied.
    ExchangeRate:
      type: object
      additionalProperties: false
      required:
        - exchange_rate_id
        - from_currency
        - to_currency
        - rate
        - effective_date
        - created_at
      properties:
        exchange_rate_id:
          type: integer
          format: int64
        from_currency:
          type: string
          pattern: ^([A-Z]{3}|C::.+)$
        to_currency:
          type: string
          pattern: ^([A-Z]{3}|C::.+)$
        rate:
          type: string
          description: JSON string, not a JSON number. Positive DECIMAL(18,8); responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^[0-9]{1,10}(\.[0-9]{1,8})?$
          not:
            pattern: ^0{1,10}(\.0{1,8})?$
          maxLength: 19
        effective_date:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        tombstoned_at:
          type: string
          format: date-time
          nullable: true
    ExchangeRateListResponse:
      type: object
      additionalProperties: false
      required:
        - exchange_rates
        - total_count
      properties:
        exchange_rates:
          type: array
          items:
            $ref: "#/components/schemas/ExchangeRate"
        total_count:
          type: integer
          format: int64
          minimum: 0
          description: Count of matching exchange rates before limit and offset are applied.
    APIError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - invalid_request
            - not_found
            - method_not_allowed
            - conflict
            - internal_error
        message:
          type: string
    Category:
      type: object
      additionalProperties: false
      required:
        - category_id
        - fqn
        - economic_intent
        - is_hidden
        - is_featured
        - parent_fqn
        - name
        - level
        - created_at
        - updated_at
      properties:
        category_id:
          type: integer
          format: int64
        fqn:
          type: string
        economic_intent:
          $ref: "#/components/schemas/CategoryEconomicIntent"
        is_hidden:
          type: boolean
        is_featured:
          type: boolean
        deletable:
          type: boolean
          description: Populated in listCategories responses. True when the active category has no active dependent resources and can be tombstone-deleted.
        parent_fqn:
          type: string
          nullable: true
        name:
          type: string
        level:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tombstoned_at:
          type: string
          format: date-time
          nullable: true
    CategoryListResponse:
      type: object
      additionalProperties: false
      required:
        - categories
        - total_count
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        total_count:
          type: integer
          format: int64
          minimum: 0
          description: Count of matching categories before limit and offset are applied.
    CategoryEconomicIntent:
      description: "Economic meaning used to validate journal-record shape and derive transaction classification and reporting treatment."
      type: string
      enum:
        - expense
        - fee
        - income
        - refund
        - transfer
        - exchange
        - adjustment
        - fx_gain_loss
    CreateCategoryRequest:
      type: object
      additionalProperties: false
      required:
        - fqn
        - economic_intent
      properties:
        fqn:
          description: "Colon-separated hierarchical FQN for the category leaf."
          type: string
        economic_intent:
          $ref: "#/components/schemas/CategoryEconomicIntent"
        is_hidden:
          description: "Whether the entity is excluded from default lists."
          type: boolean
          default: false
        is_featured:
          description: "Whether the entity is featured in prominent selection and display surfaces."
          type: boolean
          default: false
    CreateAccountRequest:
      type: object
      additionalProperties: false
      required:
        - fqn
        - account_type
      properties:
        fqn:
          description: "Colon-separated hierarchical FQN for the account leaf."
          type: string
        account_type:
          $ref: "#/components/schemas/AccountType"
        is_hidden:
          description: "Whether the entity is excluded from default lists."
          type: boolean
          default: false
        is_featured:
          description: "Whether the entity is featured in prominent selection and display surfaces."
          type: boolean
          default: false
        currency:
          description: "Currency code using ISO 4217 or the `C::` crypto prefix."
          type: string
          nullable: true
          pattern: ^([A-Z]{3}|C::.+)$
        external_id:
          description: "Optional identifier assigned by an external system."
          type: string
          nullable: true
        external_system:
          description: "Optional namespace for `external_id`, such as a provider name."
          type: string
          nullable: true
    CreateCreditLimitHistoryRequest:
      type: object
      additionalProperties: false
      required:
        - credit_limit
        - effective_date
      properties:
        credit_limit:
          type: string
          description: JSON string, not a JSON number. Non-negative DECIMAL(18,8); responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^[0-9]{1,10}(\.[0-9]{1,8})?$
          maxLength: 19
        effective_date:
          description: "ISO 8601 date or timestamp when the value starts applying."
          type: string
          pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
          format: date
    CreateExchangeRateRequest:
      type: object
      additionalProperties: false
      required:
        - from_currency
        - to_currency
        - rate
        - effective_date
      properties:
        from_currency:
          description: "Source currency code using ISO 4217 or the `C::` crypto prefix."
          type: string
          pattern: ^([A-Z]{3}|C::.+)$
        to_currency:
          description: "Destination currency code using ISO 4217 or the `C::` crypto prefix."
          type: string
          pattern: ^([A-Z]{3}|C::.+)$
        rate:
          type: string
          description: JSON string, not a JSON number. Positive DECIMAL(18,8); responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^[0-9]{1,10}(\.[0-9]{1,8})?$
          not:
            pattern: ^0{1,10}(\.0{1,8})?$
          maxLength: 19
        effective_date:
          description: "ISO 8601 date or timestamp when the value starts applying."
          type: string
          format: date-time
    CreateJournalRecordRequest:
      type: object
      additionalProperties: false
      required:
        - account_id
        - currency
        - amount
        - category_id
        - posting_status
        - reconciliation_status
        - source
      properties:
        account_id:
          description: "Account identifier for this journal record or request."
          type: integer
          format: int64
          minimum: 1
        member_id:
          description: "Optional household-member identifier for the journal records."
          type: integer
          format: int64
          minimum: 1
          nullable: true
        currency:
          description: "Currency code using ISO 4217 or the `C::` crypto prefix."
          type: string
          pattern: ^([A-Z]{3}|C::.+)$
        amount:
          type: string
          description: JSON string, not a JSON number. Signed non-zero DECIMAL(18,8); responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
          maxLength: 20
        amount_usd:
          type: string
          nullable: true
          description: JSON string or null, not a JSON number. Signed non-zero DECIMAL(18,8) when present; responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
          maxLength: 20
        category_id:
          description: "Category identifier for this journal record or shorthand transaction."
          type: integer
          format: int64
          minimum: 1
        tag_ids:
          description: "Tag identifiers to assign to the journal records."
          type: array
          items:
            type: integer
            format: int64
            minimum: 1
        memo:
          description: "Optional memo text for the journal records."
          type: string
          nullable: true
        pending_date:
          type: string
          description: UTC banking transaction timestamp, such as a card hold; when omitted or null, defaults to initiated_date at 00:00:00Z for non-bank records.
          nullable: true
          format: date-time
        posted_date:
          type: string
          description: UTC timestamp when the record posted; use pending_date for manual non-bank records and null until posted.
          nullable: true
          format: date-time
        posting_status:
          $ref: "#/components/schemas/PostingStatus"
        reconciliation_status:
          $ref: "#/components/schemas/ReconciliationStatus"
        source:
          $ref: "#/components/schemas/ManualSource"
        external_id:
          description: "Optional identifier assigned by an external system."
          type: string
          nullable: true
        external_system:
          description: "Optional namespace for `external_id`, such as a provider name."
          type: string
          nullable: true
    BulkCategorizeRecordsRequest:
      type: object
      additionalProperties: false
      required:
        - record_ids
        - category_id
      properties:
        record_ids:
          description: "Journal-record identifiers to update."
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            format: int64
            minimum: 1
        category_id:
          description: "Category identifier for this journal record or shorthand transaction."
          type: integer
          format: int64
          minimum: 1
    BulkTagRecordsRequest:
      type: object
      additionalProperties: false
      minProperties: 2
      description: Provide at least one non-empty add_tag_ids or remove_tag_ids array. The two arrays must not overlap.
      required:
        - record_ids
      properties:
        record_ids:
          description: "Journal-record identifiers to update."
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            format: int64
            minimum: 1
        add_tag_ids:
          description: "Tag identifiers to add to every selected journal record."
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            format: int64
            minimum: 1
        remove_tag_ids:
          description: "Tag identifiers to remove from every selected journal record."
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            format: int64
            minimum: 1
    BulkReassignRecordsAccountRequest:
      type: object
      additionalProperties: false
      required:
        - record_ids
        - account_id
      properties:
        record_ids:
          description: "Journal-record identifiers to update."
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            format: int64
            minimum: 1
        account_id:
          description: "Account identifier for this journal record or request."
          type: integer
          format: int64
          minimum: 1
    BulkUpdateRecordStatusRequest:
      type: object
      additionalProperties: false
      minProperties: 2
      description: Provide posting_status, reconciliation_status, or both.
      required:
        - record_ids
      properties:
        record_ids:
          description: "Journal-record identifiers to update."
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            format: int64
            minimum: 1
        posting_status:
          $ref: "#/components/schemas/NonExpectedPostingStatus"
        reconciliation_status:
          $ref: "#/components/schemas/ReconciliationStatus"
    BulkRecordOperationResponse:
      type: object
      additionalProperties: false
      required:
        - record_ids
        - updated_count
      properties:
        record_ids:
          type: array
          items:
            type: integer
            format: int64
        updated_count:
          type: integer
          minimum: 0
    CreateSpendTransactionRequest:
      type: object
      additionalProperties: false
      required:
        - initiated_date
        - funding_account_id
        - counterparty_account_id
        - category_id
        - currency
        - amount
      properties:
        initiated_date:
          description: "Human-facing transaction date in YYYY-MM-DD format."
          type: string
          pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
          format: date
        funding_account_id:
          description: "Balance-account identifier that funds the spend."
          type: integer
          format: int64
          minimum: 1
