openapi: 3.0.3
info:
  title: Mina REST API
  version: 0.1.0
paths:
  /health:
    get:
      operationId: getHealth
      summary: Report process health.
      responses:
        "200":
          description: The process is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
