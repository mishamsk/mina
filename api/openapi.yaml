  /api/transactions:
    get:
      operationId: listTransactions
      summary: List transactions with journal records.
      description: Defaults to `initiated_date` descending with `transaction_id` descending as the stable tiebreaker.
      parameters:
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [initiated_date, created_at]
            default: initiated_date
            x-enum-varnames:
              - ListTransactionsParamsSortInitiatedDate
              - ListTransactionsParamsSortCreatedAt
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
            x-enum-varnames:
              - ListTransactionsParamsSortDirAsc
              - ListTransactionsParamsSortDirDesc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
        - name: anchor_date
          in: query
          required: false
          description: Date-only anchor that returns the page containing the first transaction at or before this initiated date. If the anchor is older than every transaction, the page clamps to the oldest transaction page. Valid only with initiated_date descending ordering and overrides offset when present.
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
            format: date
        - name: account_id
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: integer
              format: int64
              minimum: 1
        - name: category_id
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: integer
              format: int64
              minimum: 1
        - name: tag_id
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: integer
              format: int64
              minimum: 1
        - name: member_id
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: integer
              format: int64
              minimum: 1
        - name: posting_status
          in: query
          required: false
          description: Filters transactions by active record posting status. Expected transactions are excluded by default and returned only when this filter explicitly includes `expected`.
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: "#/components/schemas/PostingStatus"
        - name: transaction_class
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: "#/components/schemas/TransactionClass"
        - name: amount_min
          in: query
          required: false
          description: JSON string, not a JSON number. Signed DECIMAL(18,8) minimum filter; use at most 10 integer digits and 8 fractional digits.
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: amount_max
          in: query
          required: false
          description: JSON string, not a JSON number. Signed DECIMAL(18,8) maximum filter; use at most 10 integer digits and 8 fractional digits.
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: amount_usd_min
          in: query
          required: false
          description: JSON string, not a JSON number. Signed DECIMAL(18,8) USD minimum filter; use at most 10 integer digits and 8 fractional digits.
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: amount_usd_max
          in: query
          required: false
          description: JSON string, not a JSON number. Signed DECIMAL(18,8) USD maximum filter; use at most 10 integer digits and 8 fractional digits.
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: initiated_date_from
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
            format: date
        - name: initiated_date_to
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
            format: date
        - name: pending_date_from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: pending_date_to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: posted_date_from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: posted_date_to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          required: false
          description: Case-insensitive contains search over active journal-record memos and counterparty account names.
          schema:
            type: string
      responses:
        "200":
          description: Transactions in requested order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createTransaction
      summary: Create a per-currency balanced transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
      responses:
        "201":
          description: Transaction created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/transactions/month-totals:
    get:
      operationId: getTransactionMonthTotals
      summary: Get server-computed spend and income totals for a civil month.
      description: Aggregates active journal records with posting_status pending or posted by transaction initiated_date for the requested YYYY-MM month. Expected and cancelled records are excluded. Expense and fee component records increase spend, income component records increase income, refund records are excluded from both spend and gross income, and transfer/exchange/adjustment/fx_gain_loss records are excluded. Totals are USD equivalents; records without amount_usd are counted as unconverted for their total.
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}$
      responses:
        "200":
          description: Month spend and income totals.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionMonthTotalsResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
