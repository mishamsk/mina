openapi: 3.0.3
info:
  title: Mina REST API
  version: 0.1.0
paths:
  /health:
    get:
      operationId: getHealth
      summary: Report process health.
      responses:
        "200":
          description: The process is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /categories:
    get:
      operationId: listCategories
      summary: List categories.
      parameters:
        - name: include_hidden
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: fqn
            enum:
              - fqn
              - created_at
              - updated_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Categories in deterministic FQN order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createCategory
      summary: Create a category.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Category created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /categories/{category_id}:
    parameters:
      - name: category_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getCategory
      summary: Get a category.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Category found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateCategory
      summary: Update category hidden state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: Category updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteCategory
      summary: Tombstone a category.
      responses:
        "204":
          description: Category tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /tags:
    get:
      operationId: listTags
      summary: List tags.
      parameters:
        - name: include_hidden
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: fqn
            enum:
              - fqn
              - created_at
              - updated_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Tags in deterministic FQN order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createTag
      summary: Create a tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: Tag created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /tags/{tag_id}:
    parameters:
      - name: tag_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getTag
      summary: Get a tag.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Tag found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateTag
      summary: Update tag hidden state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTagRequest"
      responses:
        "200":
          description: Tag updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTag
      summary: Tombstone a tag.
      responses:
        "204":
          description: Tag tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /members:
    get:
      operationId: listMembers
      summary: List household members.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: name
            enum:
              - name
              - created_at
              - updated_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Members in deterministic name order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createMember
      summary: Create a household member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberRequest"
      responses:
        "201":
          description: Member created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /members/{member_id}:
    parameters:
      - name: member_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getMember
      summary: Get a household member.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Member found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateMember
      summary: Update household member name.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRequest"
      responses:
        "200":
          description: Member updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: deleteMember
      summary: Tombstone a household member.
      responses:
        "204":
          description: Member tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /accounts:
    get:
      operationId: listAccounts
      summary: List accounts.
      parameters:
        - name: include_hidden
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: fqn
            enum:
              - fqn
              - created_at
              - updated_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Accounts in deterministic FQN order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createAccount
      summary: Create an account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "201":
          description: Account created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /accounts/{account_id}:
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getAccount
      summary: Get an account.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Account found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateAccount
      summary: Update account hidden state and external identifiers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          description: Account updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteAccount
      summary: Tombstone an account.
      responses:
        "204":
          description: Account tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /accounts/{account_id}/credit-limit-history:
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: listCreditLimitHistory
      summary: List credit limit history for an account.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: effective_date
            enum:
              - effective_date
              - created_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Credit limit history in effective-date order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditLimitHistoryListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createCreditLimitHistory
      summary: Create a credit limit history entry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreditLimitHistoryRequest"
      responses:
        "201":
          description: Credit limit history entry created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditLimitHistory"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /credit-limit-history/{credit_limit_history_id}:
    parameters:
      - name: credit_limit_history_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getCreditLimitHistory
      summary: Get a credit limit history entry.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Credit limit history entry found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditLimitHistory"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteCreditLimitHistory
      summary: Tombstone a credit limit history entry.
      responses:
        "204":
          description: Credit limit history entry tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /exchange-rates:
    get:
      operationId: listExchangeRates
      summary: List exchange rates.
      parameters:
        - name: from_currency
          in: query
          required: false
          schema:
            type: string
            pattern: ^[A-Z]{3}$
        - name: to_currency
          in: query
          required: false
          schema:
            type: string
            pattern: ^[A-Z]{3}$
        - name: effective_date
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: currency_pair
            enum:
              - currency_pair
              - from_currency
              - to_currency
              - effective_date
              - created_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Exchange rates in deterministic currency/date order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRateListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createExchangeRate
      summary: Create an exchange rate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExchangeRateRequest"
      responses:
        "201":
          description: Exchange rate created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRate"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /exchange-rates/{exchange_rate_id}:
    parameters:
      - name: exchange_rate_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getExchangeRate
      summary: Get an exchange rate.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Exchange rate found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRate"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateExchangeRate
      summary: Update an exchange rate value.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExchangeRateRequest"
      responses:
        "200":
          description: Exchange rate updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRate"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteExchangeRate
      summary: Tombstone an exchange rate.
      responses:
        "204":
          description: Exchange rate tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /transactions:
    get:
      operationId: listTransactions
      summary: List transactions with journal records.
      responses:
        "200":
          description: Transactions in initiated-date order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
    post:
      operationId: createTransaction
      summary: Create a balanced transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
      responses:
        "201":
          description: Transaction created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /records:
    get:
      operationId: searchJournalRecords
      summary: Search active journal records.
      parameters:
        - name: account_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: category_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: tag_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: member_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: posting_status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PostingStatus"
        - name: reconciliation_status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReconciliationStatus"
        - name: amount_min
          in: query
          required: false
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: amount_max
          in: query
          required: false
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: amount_usd_min
          in: query
          required: false
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: amount_usd_max
          in: query
          required: false
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: initiated_date_from
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        - name: initiated_date_to
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        - name: pending_date_from
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        - name: pending_date_to
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        - name: posted_date_from
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        - name: posted_date_to
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        - name: memo_contains
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Matching active journal records in transaction date order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalRecordSearchResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /accounts/{account_id}/records:
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: searchAccountJournalRecords
      summary: Search active journal records for one account.
      parameters:
        - name: category_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: tag_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: member_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: posting_status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PostingStatus"
        - name: reconciliation_status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReconciliationStatus"
        - name: amount_min
          in: query
          required: false
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: amount_max
          in: query
          required: false
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: amount_usd_min
          in: query
          required: false
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: amount_usd_max
          in: query
          required: false
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: initiated_date_from
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        - name: initiated_date_to
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        - name: pending_date_from
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        - name: pending_date_to
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        - name: posted_date_from
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        - name: posted_date_to
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
        - name: memo_contains
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Matching active account records with containing transaction identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalRecordSearchResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /records/bulk/category:
    post:
      operationId: bulkCategorizeJournalRecords
      summary: Assign one category to selected journal records.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCategorizeRecordsRequest"
      responses:
        "200":
          description: Records categorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRecordOperationResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /records/bulk/tags:
    post:
      operationId: bulkUpdateJournalRecordTags
      summary: Add and remove tags on selected journal records.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkTagRecordsRequest"
      responses:
        "200":
          description: Record tags updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRecordOperationResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /records/bulk/account:
    post:
      operationId: bulkReassignJournalRecordAccount
      summary: Assign one account to selected journal records.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkReassignRecordsAccountRequest"
      responses:
        "200":
          description: Record accounts reassigned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRecordOperationResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /records/bulk/status:
    post:
      operationId: bulkUpdateJournalRecordStatuses
      summary: Update posting and reconciliation statuses on selected journal records.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpdateRecordStatusRequest"
      responses:
        "200":
          description: Record statuses updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRecordOperationResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /transactions/{transaction_id}:
    parameters:
      - name: transaction_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getTransaction
      summary: Get a transaction with journal records.
      responses:
        "200":
          description: Transaction found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: replaceTransaction
      summary: Replace a transaction and its journal records.
      description: Replaces initiated_date and the full journal record set atomically. The transaction_id is preserved, previous active records are tombstoned, and replacement records must balance to zero amount_usd.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTransactionRequest"
      responses:
        "200":
          description: Transaction replaced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTransaction
      summary: Tombstone a transaction and its journal records.
      responses:
        "204":
          description: Transaction tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
