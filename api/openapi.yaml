openapi: 3.0.3
info:
  title: Mina REST API
  version: 0.1.0
paths:
  /api/app/demo-seed:
    post:
      operationId: seedDemo
      summary: Seed demo data into the opened app.
      responses:
        "200":
          description: Demo data seeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoSeedResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/health:
    get:
      operationId: getHealth
      summary: Report process health.
      responses:
        "200":
          description: The process is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations:
    get:
      operationId: listBackgroundOperations
      summary: List registered background operations.
      responses:
        "200":
          description: Registered background operations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackgroundOperationListResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/exchange-rate-loading/status:
    get:
      operationId: getExchangeRateLoadingStatus
      summary: Get exchange-rate loading operation status.
      responses:
        "200":
          description: Exchange-rate loading status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRateLoadingStatusResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/exchange-rate-loading/runs:
    post:
      operationId: startExchangeRateLoadingRun
      summary: Start an exchange-rate loading run.
      responses:
        "202":
          description: Exchange-rate loading was invoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationRunReferenceResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/exchange-rate-loading/runs/{operation_run_id}:
    parameters:
      - name: operation_run_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getExchangeRateLoadingRun
      summary: Get one exchange-rate loading run.
      responses:
        "200":
          description: Exchange-rate loading run status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationRunResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/database-backup/status:
    get:
      operationId: getDatabaseBackupStatus
      summary: Get database backup operation status.
      responses:
        "200":
          description: Database backup status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseBackupStatusResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/database-backup/runs:
    post:
      operationId: startDatabaseBackupRun
      summary: Start a database backup run.
      responses:
        "202":
          description: Database backup was invoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationRunReferenceResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/database-backup/runs/{operation_run_id}:
    parameters:
      - name: operation_run_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getDatabaseBackupRun
      summary: Get one database backup run.
      responses:
        "200":
          description: Database backup run status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationRunResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/categories:
    get:
      operationId: listCategories
      summary: List categories.
      parameters:
        - name: include_hidden
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: fqn
            enum:
              - fqn
              - created_at
              - updated_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Categories in deterministic FQN order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createCategory
      summary: Create a category.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Category created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/categories/{category_id}:
    parameters:
      - name: category_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getCategory
      summary: Get a category.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Category found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateCategory
      summary: Update category hidden state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: Category updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteCategory
      summary: Tombstone a category.
      responses:
        "204":
          description: Category tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/tags:
    get:
      operationId: listTags
      summary: List tags.
      parameters:
        - name: include_hidden
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: fqn
            enum:
              - fqn
              - created_at
              - updated_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Tags in deterministic FQN order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createTag
      summary: Create a tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: Tag created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/tags/{tag_id}:
    parameters:
      - name: tag_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getTag
      summary: Get a tag.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Tag found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateTag
      summary: Update tag hidden state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTagRequest"
      responses:
        "200":
          description: Tag updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTag
      summary: Tombstone a tag.
      responses:
        "204":
          description: Tag tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/members:
    get:
      operationId: listMembers
      summary: List household members.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: name
            enum:
              - name
              - created_at
              - updated_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Members in deterministic name order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createMember
      summary: Create a household member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberRequest"
      responses:
        "201":
          description: Member created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/members/{member_id}:
    parameters:
      - name: member_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getMember
      summary: Get a household member.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Member found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateMember
      summary: Update household member name.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRequest"
      responses:
        "200":
          description: Member updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: deleteMember
      summary: Tombstone a household member.
      responses:
        "204":
          description: Member tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/accounts:
    get:
      operationId: listAccounts
      summary: List accounts.
      parameters:
        - name: include_hidden
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: account_type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountType"
        - name: is_featured
          in: query
          required: false
          schema:
            type: boolean
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: fqn
            enum:
              - fqn
              - created_at
              - updated_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Accounts in deterministic FQN order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createAccount
      summary: Create an account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "201":
          description: Account created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/accounts/{account_id}:
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getAccount
      summary: Get an account.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Account found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateAccount
      summary: Update account hidden state and external identifiers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          description: Account updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteAccount
      summary: Tombstone an account.
      responses:
        "204":
          description: Account tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/accounts/{account_id}/credit-limit-history:
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: listCreditLimitHistory
      summary: List credit limit history for an account.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: effective_date
            enum:
              - effective_date
              - created_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Credit limit history in effective-date order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditLimitHistoryListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createCreditLimitHistory
      summary: Create a credit limit history entry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreditLimitHistoryRequest"
      responses:
        "201":
          description: Credit limit history entry created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditLimitHistory"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/credit-limit-history/{credit_limit_history_id}:
    parameters:
      - name: credit_limit_history_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getCreditLimitHistory
      summary: Get a credit limit history entry.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Credit limit history entry found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditLimitHistory"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteCreditLimitHistory
      summary: Tombstone a credit limit history entry.
      responses:
        "204":
          description: Credit limit history entry tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/exchange-rates:
    get:
      operationId: listExchangeRates
      summary: List exchange rates.
      parameters:
        - name: from_currency
          in: query
          required: false
          schema:
            type: string
            pattern: ^([A-Z]{3}|C::.+)$
        - name: to_currency
          in: query
          required: false
          schema:
            type: string
            pattern: ^([A-Z]{3}|C::.+)$
        - name: effective_date
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: currency_pair
            enum:
              - currency_pair
              - from_currency
              - to_currency
              - effective_date
              - created_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Exchange rates in deterministic currency/date order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRateListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createExchangeRate
      summary: Create an exchange rate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExchangeRateRequest"
      responses:
        "201":
          description: Exchange rate created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRate"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/exchange-rates/{exchange_rate_id}:
    parameters:
      - name: exchange_rate_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getExchangeRate
      summary: Get an exchange rate.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Exchange rate found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRate"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateExchangeRate
      summary: Update an exchange rate value.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExchangeRateRequest"
      responses:
        "200":
          description: Exchange rate updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRate"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteExchangeRate
      summary: Tombstone an exchange rate.
      responses:
        "204":
          description: Exchange rate tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/transaction-templates:
    get:
      operationId: listTransactionTemplates
      summary: List transaction templates.
      parameters:
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: fqn
            enum:
              - fqn
              - created_at
              - updated_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Active transaction templates in caller-selected deterministic order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionTemplateListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createTransactionTemplate
      summary: Create a transaction template.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionTemplateWriteRequest"
