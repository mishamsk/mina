          in: query
          required: false
          description: JSON string, not a JSON number. Signed DECIMAL(18,8) minimum filter; use at most 10 integer digits and 8 fractional digits.
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
