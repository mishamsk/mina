            type: string
            format: date-time
        - name: posted_date_from
          description: "Minimum posted timestamp in ISO 8601 format."
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: posted_date_to
          description: "Maximum posted timestamp in ISO 8601 format."
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          required: false
          description: Case-insensitive search over active journal records. Contains-match fields are record memo, counterparty account name, account FQN, category FQN, tag FQN, member name, and account external_id. Record currency matches by exact case-insensitive code equality. Account external_system is intentionally excluded to avoid broad system-label matches.
