          description: "Account identifier to target or filter by."
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: integer
              format: int64
              minimum: 1
        - name: category_id
          description: "Category identifier to target or filter by."
          in: query
          required: false
