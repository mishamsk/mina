openapi: 3.0.3
info:
  title: Mina REST API
  version: 0.1.0
paths:
  /api/app/demo-seed:
    post:
      operationId: seedDemo
      summary: Seed demo data into the opened app.
      responses:
        "200":
          description: Demo data seeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoSeedResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/health:
    get:
      operationId: getHealth
      summary: Report process health.
      responses:
        "200":
          description: The process is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations:
    get:
      operationId: listBackgroundOperations
      summary: List registered background operations.
      responses:
        "200":
          description: Registered background operations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackgroundOperationListResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/exchange-rate-loading/status:
    get:
      operationId: getExchangeRateLoadingStatus
      summary: Get exchange-rate loading operation status.
      responses:
        "200":
          description: Exchange-rate loading status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRateLoadingStatusResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/exchange-rate-loading/runs:
    post:
      operationId: startExchangeRateLoadingRun
      summary: Start an exchange-rate loading run.
      responses:
        "202":
          description: Exchange-rate loading was invoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationRunReferenceResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/exchange-rate-loading/runs/{operation_run_id}:
    parameters:
      - name: operation_run_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getExchangeRateLoadingRun
      summary: Get one exchange-rate loading run.
      responses:
        "200":
          description: Exchange-rate loading run status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationRunResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/database-backup/status:
    get:
      operationId: getDatabaseBackupStatus
      summary: Get database backup operation status.
      responses:
        "200":
          description: Database backup status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseBackupStatusResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/database-backup/runs:
    post:
      operationId: startDatabaseBackupRun
      summary: Start a database backup run.
      responses:
        "202":
          description: Database backup was invoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationRunReferenceResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/database-backup/runs/{operation_run_id}:
    parameters:
      - name: operation_run_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getDatabaseBackupRun
      summary: Get one database backup run.
      responses:
        "200":
          description: Database backup run status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationRunResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/categories:
    get:
      operationId: listCategories
      summary: List categories.
      parameters:
        - name: include_hidden
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: economic_intent
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: "#/components/schemas/CategoryEconomicIntent"
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: fqn
            enum:
              - fqn
              - created_at
              - updated_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Categories in deterministic FQN order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createCategory
      summary: Create a category.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Category created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/CategoryFQNConflict"
  /api/categories/restructure:
    post:
      operationId: restructureCategories
      summary: Rename or move a category hierarchy path.
      description: Atomically rewrites active category FQNs and active budget category paths equal to or under `from_fqn` to the `to_fqn` prefix. Tombstoned categories and budgets are not changed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestructureRequest"
      responses:
        "200":
          description: Category FQNs rewritten.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestructureResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/CategoryFQNConflict"
  /api/categories/groups:
    get:
      operationId: listCategoryGroups
      summary: List implicit category groups.
      description: Returns one item per active category FQN proper prefix. A group is hidden when every active leaf at or under it is hidden; hidden groups are excluded unless `include_hidden=true`.
      parameters:
        - name: include_hidden
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Category groups in deterministic FQN order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupStateListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/categories/set-hidden:
    post:
      operationId: setCategoryHiddenByPath
      summary: Set hidden state for a category path.
      description: Sets `is_hidden` on every active category leaf at or under `path_fqn`. A leaf path and a group path are handled identically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetHiddenByPathRequest"
      responses:
        "200":
          description: Category hidden state updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetHiddenByPathResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/categories/{category_id}:
    parameters:
      - name: category_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getCategory
      summary: Get a category.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Category found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateCategory
      summary: Update category hidden state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: Category updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteCategory
      summary: Tombstone a category.
      responses:
        "204":
          description: Category tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/tags:
    get:
      operationId: listTags
      summary: List tags.
      parameters:
        - name: include_hidden
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: fqn
            enum:
              - fqn
              - created_at
              - updated_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Tags in deterministic FQN order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createTag
      summary: Create a tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: Tag created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/TagFQNConflict"
  /api/tags/restructure:
    post:
      operationId: restructureTags
      summary: Rename or move a tag hierarchy path.
      description: Atomically rewrites active tag FQNs equal to or under `from_fqn` to the `to_fqn` prefix. Tombstoned tags are not changed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestructureRequest"
      responses:
        "200":
          description: Tag FQNs rewritten.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestructureResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/TagFQNConflict"
  /api/tags/groups:
    get:
      operationId: listTagGroups
      summary: List implicit tag groups.
      description: Returns one item per active tag FQN proper prefix. A group is hidden when every active leaf at or under it is hidden; hidden groups are excluded unless `include_hidden=true`.
      parameters:
        - name: include_hidden
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Tag groups in deterministic FQN order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupStateListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/tags/set-hidden:
    post:
      operationId: setTagHiddenByPath
      summary: Set hidden state for a tag path.
      description: Sets `is_hidden` on every active tag leaf at or under `path_fqn`. A leaf path and a group path are handled identically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetHiddenByPathRequest"
      responses:
        "200":
          description: Tag hidden state updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetHiddenByPathResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/tags/{tag_id}:
    parameters:
      - name: tag_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getTag
      summary: Get a tag.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Tag found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateTag
      summary: Update tag hidden state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTagRequest"
      responses:
        "200":
          description: Tag updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTag
      summary: Tombstone a tag.
      responses:
        "204":
          description: Tag tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/members:
    get:
      operationId: listMembers
      summary: List household members.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: name
            enum:
              - name
              - created_at
              - updated_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Members in deterministic name order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createMember
      summary: Create a household member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberRequest"
      responses:
        "201":
          description: Member created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/members/{member_id}:
    parameters:
      - name: member_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getMember
      summary: Get a household member.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Member found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateMember
      summary: Update household member name.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRequest"
      responses:
        "200":
          description: Member updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: deleteMember
      summary: Tombstone a household member.
      responses:
        "204":
          description: Member tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/accounts:
    get:
      operationId: listAccounts
      summary: List accounts.
      parameters:
        - name: include_hidden
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: account_type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountType"
        - name: is_featured
          in: query
          required: false
          schema:
            type: boolean
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: fqn
            enum:
              - fqn
              - created_at
              - updated_at
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Accounts in deterministic FQN order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createAccount
      summary: Create an account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "201":
          description: Account created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/AccountFQNConflict"
  /api/accounts/restructure:
    post:
      operationId: restructureAccounts
      summary: Rename or move an account hierarchy path.
      description: Atomically rewrites active account FQNs equal to or under `from_fqn` to the `to_fqn` prefix. Tombstoned accounts are not changed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestructureRequest"
      responses:
        "200":
          description: Account FQNs rewritten.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestructureResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/AccountFQNConflict"
  /api/accounts/groups:
    get:
      operationId: listAccountGroups
      summary: List implicit account groups.
      description: Returns one item per active account FQN proper prefix. A group is hidden when every active leaf at or under it is hidden; hidden groups are excluded unless `include_hidden=true`.
      parameters:
        - name: include_hidden
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Account groups in deterministic FQN order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupStateListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/accounts/set-hidden:
    post:
      operationId: setAccountHiddenByPath
      summary: Set hidden state for an account path.
      description: Sets `is_hidden` on every active account leaf at or under `path_fqn`. A leaf path and a group path are handled identically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetHiddenByPathRequest"
      responses:
        "200":
          description: Account hidden state updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetHiddenByPathResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/accounts/balances:
    get:
      operationId: listAccountBalances
      summary: List current and posted-only balances for active balance accounts.
      description: Returns server-computed per-currency balances for active `balance` accounts. `current_balance` includes pending and posted records; `posted_balance` includes posted records only; cancelled and expected records are excluded. Accounts with `account.currency` and no records return a zero row for that currency.
      parameters:
        - name: include_hidden
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: account_ids
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: integer
              format: int64
              minimum: 1
      responses:
        "200":
          description: Account balances.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBalanceListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/accounts/{account_id}:
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getAccount
      summary: Get an account.
      parameters:
        - name: include_tombstoned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Account found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateAccount
      summary: Update account hidden state and external identifiers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          description: Account updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteAccount
      summary: Tombstone an account.
      responses:
        "204":
          description: Account tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/accounts/{account_id}/credit-limit-history:
    parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
