openapi: 3.0.3
info:
  title: Mina REST API
  version: 0.1.0
paths:
  /api/app/demo-seed:
    post:
      operationId: seedDemo
      tags:
        - demo
      summary: Seed demo data into the opened app.
      responses:
        "200":
          description: Demo data seeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoSeedResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/health:
    get:
      operationId: getHealth
      tags:
        - health
      summary: Report process health.
      responses:
        "200":
          description: The process is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/settings:
    get:
      operationId: getSettings
      tags:
        - settings
      summary: Get the immutable settings snapshot for this process.
      responses:
        "200":
          description: Backend-owned groups with active values and effective sources.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations:
    get:
      operationId: listBackgroundOperations
      tags:
        - operations
      summary: List registered background operations.
      responses:
        "200":
          description: Registered background operations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackgroundOperationListResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/runs:
    get:
      operationId: listBackgroundOperationRunEnvelopes
      tags:
        - operations
      summary: List background-operation run envelopes.
      parameters:
        - name: operation_id
          description: "Filter run history to one registered background-operation type."
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BackgroundOperationId"
        - name: limit
          description: "Maximum number of matching results to return, from 1 through 500; supply this to keep responses bounded."
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          description: "Zero-based number of matching results to skip."
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Newest-first background-operation run page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackgroundOperationRunListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/exchange-rate-loading/status:
    get:
      operationId: getExchangeRateLoadingStatus
      tags:
        - operations
      summary: Get exchange-rate loading operation status.
      responses:
        "200":
          description: Exchange-rate loading status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRateLoadingStatusResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/exchange-rate-loading/runs:
    post:
      operationId: startExchangeRateLoadingRun
      tags:
        - operations
      summary: Start an exchange-rate loading run.
      responses:
        "202":
          description: Exchange-rate loading was invoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationRunReferenceResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/exchange-rate-loading/runs/{operation_run_id}:
    parameters:
      - name: operation_run_id
        description: "Numeric identifier of the background-operation run."
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getExchangeRateLoadingRun
      tags:
        - operations
      summary: Get one exchange-rate loading run.
      responses:
        "200":
          description: Exchange-rate loading run status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRateLoadingRun"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/database-backup/status:
    get:
      operationId: getDatabaseBackupStatus
      tags:
        - operations
      summary: Get database backup operation status.
      responses:
        "200":
          description: Database backup status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseBackupStatusResponse"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/database-backup/runs:
    post:
      operationId: startDatabaseBackupRun
      tags:
        - operations
      summary: Start a database backup run.
      responses:
        "202":
          description: Database backup was invoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationRunReferenceResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/background-operations/database-backup/runs/{operation_run_id}:
    parameters:
      - name: operation_run_id
        description: "Numeric identifier of the background-operation run."
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getDatabaseBackupRun
      tags:
        - operations
      summary: Get one database backup run.
      responses:
        "200":
          description: Database backup run status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseBackupRun"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
  /api/categories:
    get:
      operationId: listCategories
      tags:
        - categories
      summary: List categories.
      parameters:
        - name: include_hidden
          description: "Include hidden active entities; defaults to false."
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: include_tombstoned
          description: "Include tombstoned entities; defaults to false."
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: is_featured
          description: "Filter by featured state when provided."
          in: query
          required: false
          schema:
            type: boolean
        - name: economic_intent
          description: "Filter by one or more category economic intents."
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: "#/components/schemas/CategoryEconomicIntent"
        - name: sort
          description: "Field used to sort matching results; defaults to `fqn`."
          in: query
          required: false
          schema:
            type: string
            default: fqn
            enum:
              - fqn
              - created_at
              - updated_at
        - name: sort_dir
          description: "Sort direction for matching results; defaults to `asc`."
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          description: "Maximum number of matching results to return, from 1 through 500; supply this to keep responses bounded."
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          description: "Zero-based number of matching results to skip."
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Categories in deterministic FQN order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createCategory
      tags:
        - categories
      summary: Create a category.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Category created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/CategoryFQNConflict"
  /api/categories/restructure:
    post:
      operationId: restructureCategories
      tags:
        - categories
      summary: Rename or move a category hierarchy path.
      description: Atomically rewrites active category FQNs and active budget category paths equal to or under `from_fqn` to the `to_fqn` prefix. Tombstoned categories and budgets are not changed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestructureRequest"
      responses:
        "200":
          description: Category FQNs rewritten.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestructureResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/CategoryFQNConflict"
  /api/categories/groups:
    get:
      operationId: listCategoryGroups
      tags:
        - categories
      summary: List implicit category groups.
      description: Returns one item per active category FQN proper prefix. A group is hidden when every active leaf at or under it is hidden; hidden groups are excluded unless `include_hidden=true`.
      parameters:
        - name: include_hidden
          description: "Include hidden active entities; defaults to false."
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Category groups in deterministic FQN order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupStateListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/categories/set-hidden:
    post:
      operationId: setCategoryHiddenByPath
      tags:
        - categories
      summary: Set hidden state for a category path.
      description: Sets `is_hidden` on every active category leaf at or under `path_fqn`. A leaf path and a group path are handled identically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetHiddenByPathRequest"
      responses:
        "200":
          description: Category hidden state updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetHiddenByPathResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/categories/{category_id}:
    parameters:
      - name: category_id
        description: "Category identifier to target or filter by."
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getCategory
      tags:
        - categories
      summary: Get a category.
      parameters:
        - name: include_tombstoned
          description: "Include tombstoned entities; defaults to false."
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Category found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateCategory
      tags:
        - categories
      summary: Update category mutable metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: Category updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteCategory
      tags:
        - categories
      summary: Tombstone a category.
      responses:
        "204":
          description: Category tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/tags:
    get:
      operationId: listTags
      tags:
        - tags
      summary: List tags.
      parameters:
        - name: include_hidden
          description: "Include hidden active entities; defaults to false."
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: include_tombstoned
          description: "Include tombstoned entities; defaults to false."
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: is_featured
          description: "Filter by featured state when provided."
          in: query
          required: false
          schema:
            type: boolean
        - name: sort
          description: "Field used to sort matching results; defaults to `fqn`."
          in: query
          required: false
          schema:
            type: string
            default: fqn
            enum:
              - fqn
              - created_at
              - updated_at
        - name: sort_dir
          description: "Sort direction for matching results; defaults to `asc`."
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          description: "Maximum number of matching results to return, from 1 through 500; supply this to keep responses bounded."
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          description: "Zero-based number of matching results to skip."
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Tags in deterministic FQN order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createTag
      tags:
        - tags
      summary: Create a tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: Tag created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/TagFQNConflict"
  /api/tags/restructure:
    post:
      operationId: restructureTags
      tags:
        - tags
      summary: Rename or move a tag hierarchy path.
      description: Atomically rewrites active tag FQNs equal to or under `from_fqn` to the `to_fqn` prefix. Tombstoned tags are not changed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestructureRequest"
      responses:
        "200":
          description: Tag FQNs rewritten.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestructureResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/TagFQNConflict"
  /api/tags/groups:
    get:
      operationId: listTagGroups
      tags:
        - tags
      summary: List implicit tag groups.
      description: Returns one item per active tag FQN proper prefix. A group is hidden when every active leaf at or under it is hidden; hidden groups are excluded unless `include_hidden=true`.
      parameters:
        - name: include_hidden
          description: "Include hidden active entities; defaults to false."
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Tag groups in deterministic FQN order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupStateListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/tags/set-hidden:
    post:
      operationId: setTagHiddenByPath
      tags:
        - tags
      summary: Set hidden state for a tag path.
      description: Sets `is_hidden` on every active tag leaf at or under `path_fqn`. A leaf path and a group path are handled identically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetHiddenByPathRequest"
      responses:
        "200":
          description: Tag hidden state updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetHiddenByPathResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/tags/{tag_id}:
    parameters:
      - name: tag_id
        description: "Tag identifier to target or filter by."
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getTag
      tags:
        - tags
      summary: Get a tag.
      parameters:
        - name: include_tombstoned
          description: "Include tombstoned entities; defaults to false."
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Tag found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateTag
      tags:
        - tags
      summary: Update tag hidden state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTagRequest"
      responses:
        "200":
          description: Tag updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTag
      tags:
        - tags
      summary: Tombstone a tag.
      responses:
        "204":
          description: Tag tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/members:
    get:
      operationId: listMembers
      tags:
        - members
      summary: List household members.
      parameters:
        - name: include_hidden
          description: "Include hidden active entities; defaults to false."
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: include_tombstoned
          description: "Include tombstoned entities; defaults to false."
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: sort
          description: "Field used to sort matching results; defaults to `name`."
          in: query
          required: false
          schema:
            type: string
            default: name
            enum:
              - name
              - created_at
              - updated_at
        - name: sort_dir
          description: "Sort direction for matching results; defaults to `asc`."
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          description: "Maximum number of matching results to return, from 1 through 500; supply this to keep responses bounded."
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          description: "Zero-based number of matching results to skip."
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Members in deterministic name order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
    post:
      operationId: createMember
      tags:
        - members
      summary: Create a household member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberRequest"
      responses:
        "201":
          description: Member created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/members/{member_id}:
    parameters:
      - name: member_id
        description: "Household-member identifier to target or filter by."
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getMember
      tags:
        - members
      summary: Get a household member.
      parameters:
        - name: include_tombstoned
          description: "Include tombstoned entities; defaults to false."
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Member found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateMember
      tags:
        - members
      summary: Update household member name.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRequest"
      responses:
        "200":
          description: Member updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: deleteMember
      tags:
        - members
      summary: Tombstone a household member.
      responses:
        "204":
          description: Member tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/members/{member_id}/hidden:
    parameters:
      - name: member_id
        description: "Household-member identifier to target or filter by."
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    put:
      operationId: updateMemberHidden
      tags:
        - members
      summary: Update household member hidden state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberHiddenRequest"
      responses:
        "200":
          description: Member hidden state updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/accounts:
    get:
      operationId: listAccounts
      tags:
        - accounts
      summary: List accounts.
      parameters:
        - name: include_hidden
          description: "Include hidden active entities; defaults to false."
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: include_tombstoned
          description: "Include tombstoned entities; defaults to false."
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: account_type
          description: "Filter by balance, flow, or system account type."
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountType"
        - name: is_featured
          description: "Filter by featured state when provided."
          in: query
          required: false
          schema:
            type: boolean
        - name: sort
          description: "Field used to sort matching results; defaults to `fqn`."
          in: query
          required: false
          schema:
            type: string
            default: fqn
            enum:
              - fqn
              - created_at
              - updated_at
        - name: sort_dir
          description: "Sort direction for matching results; defaults to `asc`."
          in: query
          required: false
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
        - name: limit
          description: "Maximum number of matching results to return, from 1 through 500; supply this to keep responses bounded."
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          description: "Zero-based number of matching results to skip."
          in: query
          required: false
          schema:
            type: integer
