components:
  responses:
    InvalidRequest:
      description: The request is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    MethodNotAllowed:
      description: The route does not support the requested method.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: The server failed unexpectedly.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: The request conflicts with existing state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    DemoSeedResponse:
      type: object
      additionalProperties: false
      required:
        - members
        - accounts
        - categories
        - tags
        - exchange_rates
        - credit_limit_entries
        - transactions
      properties:
        members:
          type: integer
          minimum: 0
        accounts:
          type: integer
          minimum: 0
        categories:
          type: integer
          minimum: 0
        tags:
          type: integer
          minimum: 0
        exchange_rates:
          type: integer
          minimum: 0
        credit_limit_entries:
          type: integer
          minimum: 0
        transactions:
          type: integer
          minimum: 0
    Account:
      type: object
      additionalProperties: false
      required:
        - account_id
        - fqn
        - account_type
        - is_hidden
        - is_featured
        - parent_fqn
        - name
        - level
        - created_at
        - updated_at
      properties:
        account_id:
          type: integer
          format: int64
        fqn:
          type: string
        account_type:
          $ref: "#/components/schemas/AccountType"
        is_hidden:
          type: boolean
        is_featured:
          type: boolean
        currency:
          type: string
          nullable: true
          pattern: ^([A-Z]{3}|C::.+)$
        external_id:
          type: string
          nullable: true
        external_system:
          type: string
          nullable: true
        parent_fqn:
          type: string
          nullable: true
        name:
          type: string
        level:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tombstoned_at:
          type: string
          format: date-time
          nullable: true
    AccountListResponse:
      type: object
      additionalProperties: false
      required:
        - accounts
      properties:
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/Account"
    AccountType:
      type: string
      enum:
        - balance
        - flow
        - system
    CreditLimitHistory:
      type: object
      additionalProperties: false
      required:
        - credit_limit_history_id
        - account_id
        - credit_limit
        - effective_date
        - created_at
      properties:
        credit_limit_history_id:
          type: integer
          format: int64
        account_id:
          type: integer
          format: int64
        credit_limit:
          type: string
          description: JSON string, not a JSON number. Non-negative DECIMAL(18,8); responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^[0-9]{1,10}(\.[0-9]{1,8})?$
          maxLength: 19
        effective_date:
          type: string
          pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
          format: date
        created_at:
          type: string
          format: date-time
        tombstoned_at:
          type: string
          format: date-time
          nullable: true
    CreditLimitHistoryListResponse:
      type: object
      additionalProperties: false
      required:
        - credit_limit_history
      properties:
        credit_limit_history:
          type: array
          items:
            $ref: "#/components/schemas/CreditLimitHistory"
    ExchangeRate:
      type: object
      additionalProperties: false
      required:
        - exchange_rate_id
        - from_currency
        - to_currency
        - rate
        - effective_date
        - created_at
      properties:
        exchange_rate_id:
          type: integer
          format: int64
        from_currency:
          type: string
          pattern: ^([A-Z]{3}|C::.+)$
        to_currency:
          type: string
          pattern: ^([A-Z]{3}|C::.+)$
        rate:
          type: string
          description: JSON string, not a JSON number. Positive DECIMAL(18,8); responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^[0-9]{1,10}(\.[0-9]{1,8})?$
          not:
            pattern: ^0{1,10}(\.0{1,8})?$
          maxLength: 19
        effective_date:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        tombstoned_at:
          type: string
          format: date-time
          nullable: true
    ExchangeRateListResponse:
      type: object
      additionalProperties: false
      required:
        - exchange_rates
      properties:
        exchange_rates:
          type: array
          items:
            $ref: "#/components/schemas/ExchangeRate"
    APIError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - invalid_request
            - not_found
            - method_not_allowed
            - conflict
            - internal_error
        message:
          type: string
    Category:
      type: object
      additionalProperties: false
      required:
        - category_id
        - fqn
        - economic_intent
        - is_hidden
        - parent_fqn
        - name
        - level
        - created_at
        - updated_at
      properties:
        category_id:
