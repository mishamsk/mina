      parameters:
        - name: category_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: tag_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: member_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: posting_status
          in: query
          required: false
          description: Filters account register records by posting status. Expected records are excluded by default and returned only when this filter is explicitly `expected`.
          schema:
            $ref: "#/components/schemas/PostingStatus"
        - name: reconciliation_status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReconciliationStatus"
        - name: amount_min
          in: query
          required: false
          description: JSON string, not a JSON number. Signed DECIMAL(18,8) minimum filter; use at most 10 integer digits and 8 fractional digits; responses use fixed-scale formatting with exactly 8 fractional digits.
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: amount_max
          in: query
          required: false
          description: JSON string, not a JSON number. Signed DECIMAL(18,8) maximum filter; use at most 10 integer digits and 8 fractional digits; responses use fixed-scale formatting with exactly 8 fractional digits.
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: amount_usd_min
          in: query
          required: false
          description: JSON string, not a JSON number. Signed DECIMAL(18,8) USD minimum filter; use at most 10 integer digits and 8 fractional digits; responses use fixed-scale formatting with exactly 8 fractional digits.
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: amount_usd_max
          in: query
          required: false
          description: JSON string, not a JSON number. Signed DECIMAL(18,8) USD maximum filter; use at most 10 integer digits and 8 fractional digits; responses use fixed-scale formatting with exactly 8 fractional digits.
          schema:
            type: string
            pattern: ^-?[0-9]{1,10}(\.[0-9]{1,8})?$
            maxLength: 20
        - name: initiated_date_from
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
            format: date
        - name: initiated_date_to
          in: query
          required: false
          schema:
            type: string
            pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
            format: date
        - name: pending_date_from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: pending_date_to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: posted_date_from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: posted_date_to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: memo_contains
          in: query
          required: false
          schema:
            type: string
        - name: include_running_balance
          in: query
          required: false
          description: When true, each returned account record includes the account balance after that record in chronological order. The running balance is computed over the account's full active history in that record's currency; pending and posted records contribute, cancelled records do not.
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Matching active account records with containing transaction identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalRecordSearchResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/records/bulk/category:
    post:
      operationId: bulkCategorizeJournalRecords
      summary: Assign one category to selected journal records.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCategorizeRecordsRequest"
      responses:
        "200":
          description: Records categorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRecordOperationResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/records/bulk/tags:
    post:
      operationId: bulkUpdateJournalRecordTags
      summary: Add and remove tags on selected journal records.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkTagRecordsRequest"
      responses:
        "200":
          description: Record tags updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRecordOperationResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/records/bulk/account:
    post:
      operationId: bulkReassignJournalRecordAccount
      summary: Assign one account to selected journal records.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkReassignRecordsAccountRequest"
      responses:
        "200":
          description: Record accounts reassigned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRecordOperationResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/records/bulk/status:
    post:
      operationId: bulkUpdateJournalRecordStatuses
      summary: Update posting and reconciliation statuses on selected journal records.
      description: Updates are rejected when they would leave any transaction with a mix of cancelled and non-cancelled active journal records, or with a mix of expected and non-expected active journal records.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpdateRecordStatusRequest"
      responses:
        "200":
          description: Record statuses updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRecordOperationResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/transactions/{transaction_id}:
    parameters:
      - name: transaction_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      operationId: getTransaction
      summary: Get a transaction with journal records.
      responses:
        "200":
          description: Transaction found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: replaceTransaction
      summary: Replace a transaction and its journal records.
      description: Replaces initiated_date and the full journal record set atomically. The transaction_id is preserved, previous active records are tombstoned, and replacement records must balance to zero amount within each currency.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTransactionRequest"
      responses:
        "200":
          description: Transaction replaced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTransaction
      summary: Tombstone a transaction and its journal records.
      responses:
        "204":
          description: Transaction tombstoned.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/transactions/{transaction_id}/cancel:
    parameters:
      - name: transaction_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    post:
      operationId: cancelTransaction
      summary: Cancel a transaction.
      description: Sets posting_status to cancelled on all active journal records for the transaction. The operation is idempotent for an already-cancelled transaction and does not change dates or reconciliation status.
      responses:
        "200":
          description: Transaction cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  responses:
    InvalidRequest:
      description: The request is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    MethodNotAllowed:
      description: The route does not support the requested method.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: The server failed unexpectedly.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: The request conflicts with existing state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AccountFQNConflict:
      description: The account FQN duplicates an active account or conflicts with the active account hierarchy.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    CategoryFQNConflict:
      description: The category FQN duplicates an active category, conflicts with the active category hierarchy, or a category restructure would collide with active budget category/month rows.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TagFQNConflict:
      description: The tag FQN duplicates an active tag or conflicts with the active tag hierarchy.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TransactionTemplateFQNConflict:
      description: The transaction template FQN duplicates an active template or conflicts with the active template hierarchy.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    DemoSeedResponse:
      type: object
      additionalProperties: false
      required:
        - members
        - accounts
        - categories
        - tags
        - exchange_rates
        - credit_limit_entries
        - transactions
      properties:
        members:
          type: integer
          minimum: 0
        accounts:
          type: integer
          minimum: 0
        categories:
          type: integer
          minimum: 0
        tags:
          type: integer
          minimum: 0
        exchange_rates:
          type: integer
          minimum: 0
        credit_limit_entries:
          type: integer
          minimum: 0
        transactions:
          type: integer
          minimum: 0
    Account:
      type: object
      additionalProperties: false
      required:
        - account_id
        - fqn
        - account_type
        - is_hidden
        - is_featured
        - parent_fqn
        - name
        - level
        - created_at
        - updated_at
      properties:
        account_id:
          type: integer
          format: int64
        fqn:
          type: string
        account_type:
          $ref: "#/components/schemas/AccountType"
        is_hidden:
          type: boolean
        is_featured:
          type: boolean
        deletable:
          type: boolean
          description: Populated in listAccounts responses. True when the active account has no active dependent resources and can be tombstone-deleted.
        currency:
          type: string
          nullable: true
          pattern: ^([A-Z]{3}|C::.+)$
        external_id:
          type: string
          nullable: true
        external_system:
          type: string
          nullable: true
        parent_fqn:
          type: string
          nullable: true
        name:
          type: string
        level:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tombstoned_at:
          type: string
          format: date-time
          nullable: true
    AccountListResponse:
      type: object
      additionalProperties: false
      required:
        - accounts
        - total_count
      properties:
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/Account"
        total_count:
          type: integer
          format: int64
          minimum: 0
          description: Count of matching accounts before limit and offset are applied.
    GroupState:
      type: object
      additionalProperties: false
      required:
        - fqn
        - parent_fqn
        - level
        - is_hidden
      properties:
        fqn:
          type: string
        parent_fqn:
          type: string
          nullable: true
        level:
          type: integer
          minimum: 0
        is_hidden:
          type: boolean
    GroupStateListResponse:
      type: object
      additionalProperties: false
      required:
        - groups
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/GroupState"
    RestructureRequest:
      type: object
      additionalProperties: false
      required:
        - from_fqn
        - to_fqn
      properties:
        from_fqn:
          type: string
        to_fqn:
          type: string
    RestructureResponse:
      type: object
      additionalProperties: false
      required:
        - moved_count
      properties:
        moved_count:
          type: integer
          format: int64
          minimum: 0
    SetHiddenByPathRequest:
      type: object
      additionalProperties: false
      required:
        - path_fqn
        - is_hidden
      properties:
        path_fqn:
          type: string
        is_hidden:
          type: boolean
    SetHiddenByPathResponse:
      type: object
      additionalProperties: false
      required:
        - updated_count
      properties:
        updated_count:
          type: integer
          format: int64
          minimum: 0
    AccountBalance:
      type: object
      additionalProperties: false
      required:
        - account_id
        - currency
        - current_balance
        - current_balance_usd
        - posted_balance
        - unconverted_count
      properties:
        account_id:
          type: integer
          format: int64
        currency:
          type: string
          pattern: ^([A-Z]{3}|C::.+)$
        current_balance:
          type: string
          description: JSON string, not a JSON number. Posted plus pending aggregate DECIMAL(18,8) balance in this currency; cancelled and expected records excluded. Responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^-?[0-9]{1,30}(\.[0-9]{1,8})?$
          maxLength: 40
        credit_limit:
          type: string
          description: JSON string, not a JSON number. Current credit limit for the account, when known, from the latest active credit-limit-history row with effective_date on or before the API runtime clock's local civil date. Responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^-?[0-9]{1,30}(\.[0-9]{1,8})?$
          maxLength: 40
        current_balance_usd:
          type: string
          description: JSON string, not a JSON number. Approximate USD-equivalent DECIMAL(18,8) aggregate using stored journal-record amount_usd values only; no query-time exchange-rate conversion is performed. Partial when unconverted_count is greater than zero. Responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^-?[0-9]{1,30}(\.[0-9]{1,8})?$
          maxLength: 40
        posted_balance:
          type: string
          description: JSON string, not a JSON number. Posted-only aggregate DECIMAL(18,8) balance in this currency; cancelled and expected records excluded. Responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^-?[0-9]{1,30}(\.[0-9]{1,8})?$
          maxLength: 40
        unconverted_count:
          type: integer
          format: int64
          minimum: 0
          description: Count of active non-cancelled records contributing to this balance row that do not have amount_usd.
    AccountBalanceListResponse:
      type: object
      additionalProperties: false
      required:
        - balances
      properties:
        balances:
          type: array
          items:
            $ref: "#/components/schemas/AccountBalance"
    AccountType:
      type: string
      enum:
        - balance
        - flow
        - system
    CreditLimitHistory:
      type: object
      additionalProperties: false
      required:
        - credit_limit_history_id
        - account_id
        - credit_limit
        - effective_date
        - created_at
      properties:
        credit_limit_history_id:
          type: integer
          format: int64
        account_id:
          type: integer
          format: int64
        credit_limit:
          type: string
          description: JSON string, not a JSON number. Non-negative DECIMAL(18,8); responses use fixed-scale formatting with exactly 8 fractional digits.
          pattern: ^[0-9]{1,10}(\.[0-9]{1,8})?$
          maxLength: 19
        effective_date:
          type: string
          pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
          format: date
        created_at:
          type: string
          format: date-time
        tombstoned_at:
          type: string
          format: date-time
          nullable: true
    CreditLimitHistoryListResponse:
      type: object
      additionalProperties: false
      required:
        - credit_limit_history
        - total_count
      properties:
        credit_limit_history:
          type: array
          items:
            $ref: "#/components/schemas/CreditLimitHistory"
        total_count:
          type: integer
          format: int64
          minimum: 0
          description: Count of matching credit limit history rows before limit and offset are applied.
    ExchangeRate:
      type: object
      additionalProperties: false
      required:
        - exchange_rate_id
        - from_currency
        - to_currency
        - rate
        - effective_date
        - created_at
      properties:
        exchange_rate_id:
          type: integer
          format: int64
