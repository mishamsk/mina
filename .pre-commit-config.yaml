repos:
  - repo: builtin
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: check-json
      - id: check-json5
      - id: pretty-format-json
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-yaml
      - id: check-xml
      - id: mixed-line-ending
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
  - repo: local
    hooks:
      - id: mina-docker-version-check
        name: mina Docker version check
        entry: just docker-version-check
        language: system
        pass_filenames: false
        files: ^(docker/Dockerfile|mise\.toml|frontend/package\.json|scripts/check-docker-versions\.sh)$
      - id: mina-workflow-check
        name: mina workflow check
        entry: just workflow-check
        language: system
        pass_filenames: false
        files: ^\.github/workflows/.*\.ya?ml$
      - id: mina-fmt-check
        name: mina fmt check
        entry: just fmt-check
        language: system
        pass_filenames: false
        files: \.go$
      - id: mina-openapi-check
        name: mina openapi check
        entry: just openapi-check
        language: system
        pass_filenames: false
        always_run: true
        files: ^(Justfile|api/openapi\.yaml|api/client-surfaces\.yaml|api/oapi-codegen(-httpclient)?\.yaml|internal/httpapi/openapi/openapi\.gen\.go|internal/httpclient/openapi\.gen\.go|internal/(clientcli|mcpserver)/surface\.gen\.go|internal/tools/surfacegen/.*\.go|go\.mod|go\.sum)$
      - id: mina-frontend-openapi-check
        name: mina frontend openapi check
        entry: just frontend-openapi-check
        language: system
        pass_filenames: false
        files: ^(api/openapi\.yaml|frontend/openapi-ts\.config\.ts|frontend/src/api/generated/.*|frontend/package\.json|frontend/pnpm-lock\.yaml)$
      - id: mina-frontend-fmt-check
        name: mina frontend fmt check
        entry: just frontend-fmt-check
        language: system
        pass_filenames: false
        files: ^frontend/
      - id: mina-frontend-lint
        name: mina frontend lint
        entry: just frontend-lint
        language: system
        pass_filenames: false
        files: ^frontend/
      - id: mina-frontend-typecheck
        name: mina frontend typecheck
        entry: just frontend-typecheck
        language: system
        pass_filenames: false
        files: ^frontend/
      - id: mina-lint
        name: mina lint
        entry: just lint
        language: system
        pass_filenames: false
        files: ^(.*\.go|go\.mod|go\.sum|\.golangci\.yml)$
